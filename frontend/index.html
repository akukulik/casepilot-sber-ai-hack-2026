<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <title>CasePilot — рабочее место оператора</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="header-tools">
          <button class="icon-button" aria-label="Открыть меню">
            <svg viewBox="0 0 24 24"><path d="M5 7h14M5 12h14M5 17h14"/></svg>
          </button>
          <div class="app-icon" aria-label="CasePilot">
            <svg viewBox="0 0 24 24"><path d="M7 8V6.7A2.7 2.7 0 0 1 9.7 4h4.6A2.7 2.7 0 0 1 17 6.7V8M4 8h16v11H4zM4 12h16M10 12v2h4v-2"/></svg>
          </div>
        </div>
        <div class="operator">
          <button class="notification" aria-label="Уведомления">
            <svg viewBox="0 0 24 24"><path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 8h18c0-1-3-1-3-8ZM10 21h4"/></svg>
          </button>
          <div class="operator-copy">
            <strong>Тестовый оператор</strong>
            <span>Оператор · EMP-DEMO-001</span>
          </div>
          <div class="avatar">ТО</div>
        </div>
      </header>

      <main class="workspace">
        <aside class="queue">
          <div class="queue-title">
            <h1>Отложенные кейсы</h1>
            <span id="case-count">0</span>
          </div>
          <div class="case-list" id="case-list"></div>
        </aside>

        <section class="case-content" id="case-content">
          <div class="loading">Загружаем кейсы…</div>
        </section>

        <section class="strategy" id="strategy">
          <div class="empty">
            <div class="empty-icon">✦</div>
            <h2>Выберите кейс</h2>
            <p>CasePilot подготовит стратегию решения.</p>
          </div>
        </section>
      </main>
    </div>

    <script src="./demo-data.js" defer></script>
    <script src="./app.js" defer></script>
  </body>
</html>
